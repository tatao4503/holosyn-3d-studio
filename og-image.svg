<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="ogbg" cx="50%" cy="38%" r="80%">
      <stop offset="0%" stop-color="#0c1c38"/>
      <stop offset="60%" stop-color="#070d1a"/>
      <stop offset="100%" stop-color="#04060c"/>
    </radialGradient>
    <linearGradient id="ogspark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4da3ff"/>
      <stop offset="100%" stop-color="#0a84ff"/>
    </linearGradient>
    <linearGradient id="cone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a84ff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0a84ff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#ogbg)"/>
  <!-- faint grid floor -->
  <g stroke="#1b3a66" stroke-width="1" opacity="0.35">
    <line x1="0" y1="470" x2="1200" y2="470"/>
    <line x1="0" y1="510" x2="1200" y2="510"/>
    <line x1="0" y1="560" x2="1200" y2="560"/>
  </g>
  <!-- projector cone -->
  <path d="M600 250 L470 470 L730 470 Z" fill="url(#cone)"/>
  <!-- floating prototype glyph (exploded stand-like plates) -->
  <g transform="translate(600 250)">
    <rect x="-90" y="-70" width="180" height="120" rx="8" fill="none" stroke="#4da3ff" stroke-width="2.5" opacity="0.9"/>
    <rect x="-55" y="60" width="110" height="22" rx="5" fill="#7dc0ff" opacity="0.55"/>
    <circle cx="0" cy="-8" r="10" fill="#7df9ff"/>
  </g>
  <!-- logo + wordmark -->
  <g transform="translate(90 120)">
    <path d="M40 0 C43 18, 52 27, 70 30 C52 33, 43 42, 40 60 C37 42, 28 33, 10 30 C28 27, 37 18, 40 0 Z" fill="url(#ogspark)"/>
    <text x="92" y="46" font-family="Outfit, Inter, system-ui, sans-serif" font-size="58" font-weight="800" fill="#ffffff" letter-spacing="4">HOLOSYN</text>
  </g>
  <!-- tagline -->
  <text x="92" y="540" font-family="Inter, system-ui, sans-serif" font-size="34" font-weight="600" fill="#cfe3ff">3D 시제품 공간 발표 스튜디오</text>
  <text x="92" y="585" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="400" fill="#7d9cc4">Import · Exploded view · Measure · Showcase · Export — all in the browser</text>
</svg>
