name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Check JavaScript syntax
        run: |
          node --check app.js
          node --check scripts/holosyn-timeline.js
          node --check scripts/holosyn-pro-managers.js

      - name: Run smoke check
        run: node scripts/smoke-check.mjs

      - name: Check launcher syntax
        run: bash -n "HOLOSYN 실행.command"
